name: Release Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: minus-linux-x64
            rustflags: -C target-cpu=x86-64-v2
            llama_flags: LLAMA_NO_AVX=1 LLAMA_NO_AVX2=1 LLAMA_NO_FMA=1
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: minus-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: minus-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-v2-

      - name: Build release
        run: |
          echo "RUSTFLAGS=${{ matrix.rustflags }}"
          echo "LLAMA_NO_AVX=$LLAMA_NO_AVX"
          ${{ matrix.llama_flags }} RUSTFLAGS="${{ matrix.rustflags }}" cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/minus ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30
